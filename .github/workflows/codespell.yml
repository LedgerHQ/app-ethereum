name: Misspellings CI

on:
  workflow_dispatch:
  push:
    branches:
      - nanos
  pull_request:

jobs:
  misspell:
    name: Check misspellings
    uses: LedgerHQ/ledger-app-workflows/.github/workflows/reusable_spell_check.yml@v1
    with:
      src_path: src, src_bagl, src_features, src_nbgl, src_plugins, doc, client
